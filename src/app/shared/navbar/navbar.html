<nav [class.scrolled]="scrolled()">
  <div class="nav-inner">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <span class="logo-bracket">[</span>AL<span class="logo-bracket">]</span>
    </a>

    <ul class="nav-links">
      @for (link of links; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: link.exact }">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <a href="/contact" class="nav-cta" routerLink="/contact">Hire me</a>

    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="mobile-menu" [class.open]="menuOpen()">
    @for (link of links; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: link.exact }"
        (click)="closeMenu()">
        {{ link.label }}
      </a>
    }
  </div>
</nav>
